version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: auth_postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin_auth
      POSTGRES_PASSWORD: password_seguro
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: